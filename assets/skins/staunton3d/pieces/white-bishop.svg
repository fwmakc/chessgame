<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 45 60">
  <defs>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#e8cfa5"/>
      <stop offset="100%" stop-color="#c29b5b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g transform="translate(0, -15)">
  <!-- base -->
  <ellipse cx="22.5" cy="39" rx="12" ry="3" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1" filter="url(#shadow)"/>
  <!-- lower body -->
  <path d="M 16 36 Q 16 28 18 22 Q 20 20 22.5 20 Q 25 20 27 22 Q 29 28 29 36 Z" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- upper body -->
  <path d="M 18 22 Q 18 14 20 10 Q 22.5 8 25 10 Q 27 14 27 22 Z" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- cut -->
  <path d="M 22.5 10 L 22.5 20" fill="none" stroke="#8b6914" stroke-width="1"/>
  <!-- top ball -->
  <circle cx="22.5" cy="8" r="3" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  </g>
</svg>
