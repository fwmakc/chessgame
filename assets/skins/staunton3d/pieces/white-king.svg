<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 45 60">
  <defs>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#e8cfa5"/>
      <stop offset="100%" stop-color="#c29b5b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g transform="translate(0, -15)">
  <!-- base -->
  <ellipse cx="22.5" cy="39" rx="12" ry="3" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1" filter="url(#shadow)"/>
  <!-- body -->
  <path d="M 17 36 Q 17 28 19 22 Q 20 18 22.5 18 Q 25 18 26 22 Q 28 28 28 36 Z" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- crown base -->
  <ellipse cx="22.5" cy="18" rx="7" ry="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- crown points -->
  <circle cx="15.5" cy="14" r="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <circle cx="19.5" cy="11" r="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <circle cx="25.5" cy="11" r="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <circle cx="29.5" cy="14" r="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- cross -->
  <path d="M 22.5 6 L 22.5 14 M 19.5 9 L 25.5 9" fill="none" stroke="#8b6914" stroke-width="2" stroke-linecap="round"/>
  <!-- connecting lines -->
  <path d="M 15.5 14 L 17.5 18" fill="none" stroke="#8b6914" stroke-width="1"/>
  <path d="M 19.5 11 L 20.5 18" fill="none" stroke="#8b6914" stroke-width="1"/>
  <path d="M 25.5 11 L 24.5 18" fill="none" stroke="#8b6914" stroke-width="1"/>
  <path d="M 29.5 14 L 27.5 18" fill="none" stroke="#8b6914" stroke-width="1"/>
  </g>
</svg>
