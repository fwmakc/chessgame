<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 45 60">
  <defs>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#e8cfa5"/>
      <stop offset="100%" stop-color="#c29b5b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g transform="translate(0, -15)">
  <!-- base -->
  <rect x="10" y="37" width="25" height="4" rx="1.5" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1" filter="url(#shadow)"/>
  <!-- body -->
  <rect x="14" y="18" width="17" height="19" rx="1" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- top crenellations -->
  <rect x="10" y="14" width="5" height="5" rx="1" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <rect x="16.5" y="14" width="5" height="5" rx="1" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <rect x="23.5" y="14" width="5" height="5" rx="1" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <rect x="30" y="14" width="5" height="5" rx="1" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <rect x="10" y="18" width="25" height="2" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  </g>
</svg>
