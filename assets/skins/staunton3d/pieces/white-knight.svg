<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 45 60">
  <defs>
    <linearGradient id="wgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#e8cfa5"/>
      <stop offset="100%" stop-color="#c29b5b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g transform="translate(0, -15)">
  <!-- base -->
  <ellipse cx="22.5" cy="39" rx="12" ry="3" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1" filter="url(#shadow)"/>
  <!-- horse head -->
  <path d="M 18 36 Q 16 28 18 22 Q 19 16 22 12 Q 25 8 30 9 Q 34 10 33 14 Q 32 17 29 18 Q 28 22 27 26 Q 26 32 28 36 Z" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- ear -->
  <path d="M 24 12 L 26 7 L 28 11 Z" fill="url(#wgrad)" stroke="#8b6914" stroke-width="1"/>
  <!-- eye -->
  <circle cx="29" cy="14" r="1" fill="#8b6914"/>
  <!-- mane line -->
  <path d="M 22 12 Q 20 18 19 24" fill="none" stroke="#8b6914" stroke-width="0.8"/>
  </g>
</svg>
